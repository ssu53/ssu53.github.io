<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% seo %}
    <link rel="canonical" href="{{ site.url }}{{ page.url }}">
    <link rel="icon" type="image/jpeg" href="{{ '/assets/images/favicon.jpg' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
    <div class="container">
        {{ content }}
        <footer>
            <p>Shiye Su · Stanford, CA · {{ 'now' | date: "%Y" }}</p>
        </footer>
    </div>
<script>
    // Tap to toggle profile photo on touch devices
    if (!window.matchMedia('(hover: hover)').matches) {
        const wrapper = document.querySelector('.profile-img-wrapper');
        if (wrapper) {
            wrapper.addEventListener('click', function() {
                this.classList.toggle('show-alt');
            });
        }
    }
</script>
</body>
</html>
