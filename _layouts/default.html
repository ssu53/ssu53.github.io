<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% seo %}
    <link rel="canonical" href="{{ site.url }}{{ page.url }}">
    <link rel="icon" type="image/jpeg" href="{{ '/assets/images/favicon.jpg' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
    <div class="container">
        {{ content }}
        <footer>
            <div class="social-links">
                <a href="mailto:shiye@stanford.edu" aria-label="Email">
                    <svg><use href="#icon-email"/></svg>
                </a>
                <a href="https://scholar.google.com/citations?user=lLew4RwAAAAJ&hl" target="_blank" rel="noopener" aria-label="Google Scholar">
                    <svg><use href="#icon-scholar"/></svg>
                </a>
                <a href="https://github.com/ssu53" target="_blank" rel="noopener" aria-label="GitHub">
                    <svg><use href="#icon-github"/></svg>
                </a>
                <a href="https://www.linkedin.com/in/shiye-su/" target="_blank" rel="noopener" aria-label="LinkedIn">
                    <svg><use href="#icon-linkedin"/></svg>
                </a>
                <a href="https://twitter.com/shiye_su" target="_blank" rel="noopener" aria-label="Twitter">
                    <svg><use href="#icon-twitter"/></svg>
                </a>
            </div>
            <p>Shiye Su · Stanford, CA · {{ 'now' | date: "%Y" }}</p>
        </footer>
    </div>
<script>
    // Tap to toggle profile photo on touch devices
    if (!window.matchMedia('(hover: hover)').matches) {
        const wrapper = document.querySelector('.profile-img-wrapper');
        if (wrapper) {
            wrapper.addEventListener('click', function() {
                this.classList.toggle('show-alt');
            });
        }
    }
</script>
</body>
</html>
